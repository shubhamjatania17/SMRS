name: Render Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        run: |
          set -euo pipefail
          curl --silent --show-error --fail --max-time 20 \
            https://medresponse.onrender.com/api/health > /dev/null

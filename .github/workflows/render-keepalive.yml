name: Render Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
    steps:
      - name: Ping Render health endpoint
        run: |
          set -euo pipefail

          BASE_URL="${RENDER_BASE_URL:-https://medresponse.onrender.com}"
          HEALTH_URL="${BASE_URL%/}/api/health"

          echo "Pinging ${HEALTH_URL}"

          for attempt in 1 2 3; do
            if curl --silent --show-error --fail \
              --connect-timeout 15 --max-time 90 \
              "$HEALTH_URL" > /dev/null; then
              echo "Keep-alive ping succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Attempt ${attempt} failed. Retrying in 20s..."
              sleep 20
            fi
          done

          echo "Keep-alive ping failed after 3 attempts."
          exit 1
